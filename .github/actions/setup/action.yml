name: "Install Dependencies"
description: "Checks out code, sets up Node.js, and installs npm dependencies with cache"
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install npm dependencies
      run: npm ci
      shell: bash
